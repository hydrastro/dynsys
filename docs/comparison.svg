    <text x="785" y="588" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="935" y="588" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="1085" y="588" text-anchor="middle" fill="#d98c54">◐</text>
    <text x="1235" y="588" text-anchor="middle" fill="#5a6672">○</text>

    <!-- Periodic normal forms / codim-2 of cycles -->
    <text x="60" y="616">Periodic normal forms &amp; codim-2 of cycles</text>
    <text x="635" y="616" text-anchor="middle" fill="#5a6672">○</text>
    <text x="785" y="616" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="935" y="616" text-anchor="middle" fill="#d98c54">◐</text>
    <text x="1085" y="616" text-anchor="middle" fill="#5a6672">○</text>
    <text x="1235" y="616" text-anchor="middle" fill="#5a6672">○</text>

    <!-- Homoclinic / heteroclinic continuation -->
    <text x="60" y="644">Homoclinic / heteroclinic continuation</text>
    <text x="635" y="644" text-anchor="middle" fill="#5a6672">○</text>
    <text x="785" y="644" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="935" y="644" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="1085" y="644" text-anchor="middle" fill="#d98c54">◐</text>
    <text x="1235" y="644" text-anchor="middle" fill="#5a6672">○</text>

    <!-- Phase response curves -->
    <text x="60" y="672">Phase response curves</text>
    <text x="635" y="672" text-anchor="middle" fill="#5a6672">○</text>
    <text x="785" y="672" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="935" y="672" text-anchor="middle" fill="#5a6672">○</text>
    <text x="1085" y="672" text-anchor="middle" fill="#d98c54">◐</text>
    <text x="1235" y="672" text-anchor="middle" fill="#5a6672">○</text>

    <!-- section: EXACT / SYMBOLIC -->
    <text x="60" y="710" font-size="13" fill="#ffb454" letter-spacing="2">EXACT / SYMBOLIC &amp; SIMULATION</text>

    <!-- Exact symbolic equilibria -->
    <text x="60" y="740">Exact symbolic equilibria (CAS, rational arithmetic)</text>
    <text x="635" y="740" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="785" y="740" text-anchor="middle" fill="#5a6672">○</text>
    <text x="935" y="740" text-anchor="middle" fill="#5a6672">○</text>
    <text x="1085" y="740" text-anchor="middle" fill="#5a6672">○</text>
    <text x="1235" y="740" text-anchor="middle" fill="#5a6672">○</text>

    <!-- Certified / exact eigenvalues + Routh-Hurwitz -->
    <text x="60" y="768">Exact eigenvalues + Routh–Hurwitz (proof-carrying)</text>
    <text x="635" y="768" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="785" y="768" text-anchor="middle" fill="#5a6672">○</text>
    <text x="935" y="768" text-anchor="middle" fill="#5a6672">○</text>
    <text x="1085" y="768" text-anchor="middle" fill="#5a6672">○</text>
    <text x="1235" y="768" text-anchor="middle" fill="#5a6672">○</text>

    <!-- Time integration / phase portraits -->
    <text x="60" y="796">Interactive simulation &amp; phase portraits</text>
    <text x="635" y="796" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="785" y="796" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="935" y="796" text-anchor="middle" fill="#d98c54">◐</text>
    <text x="1085" y="796" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="1235" y="796" text-anchor="middle" fill="#7ee0c0">●</text>

    <!-- Lyapunov spectrum / chaos -->
    <text x="60" y="824">Lyapunov spectrum, basins, box-counting dimension</text>
    <text x="635" y="824" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="785" y="824" text-anchor="middle" fill="#5a6672">○</text>
    <text x="935" y="824" text-anchor="middle" fill="#5a6672">○</text>
    <text x="1085" y="824" text-anchor="middle" fill="#d98c54">◐</text>
    <text x="1235" y="824" text-anchor="middle" fill="#d98c54">◐</text>

    <!-- Fractals + logistic-Mandelbrot bridge -->
    <text x="60" y="852">Fractals + logistic↔Mandelbrot bridge</text>
    <text x="635" y="852" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="785" y="852" text-anchor="middle" fill="#5a6672">○</text>
    <text x="935" y="852" text-anchor="middle" fill="#5a6672">○</text>
    <text x="1085" y="852" text-anchor="middle" fill="#5a6672">○</text>
    <text x="1235" y="852" text-anchor="middle" fill="#5a6672">○</text>

    <!-- Maps + IFS -->
    <text x="60" y="880">Iterated maps &amp; IFS (chaos game)</text>
    <text x="635" y="880" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="785" y="880" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="935" y="880" text-anchor="middle" fill="#d98c54">◐</text>
    <text x="1085" y="880" text-anchor="middle" fill="#d98c54">◐</text>
    <text x="1235" y="880" text-anchor="middle" fill="#d98c54">◐</text>

    <!-- DDEs -->
    <text x="60" y="908">Delay differential equations (DDEs)</text>
    <text x="635" y="908" text-anchor="middle" fill="#5a6672">○</text>
    <text x="785" y="908" text-anchor="middle" fill="#5a6672">○</text>
    <text x="935" y="908" text-anchor="middle" fill="#5a6672">○</text>
    <text x="1085" y="908" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="1235" y="908" text-anchor="middle" fill="#5a6672">○</text>

    <!-- section: PRACTICAL -->
    <text x="60" y="946" font-size="13" fill="#ffb454" letter-spacing="2">PRACTICAL</text>

    <!-- No external runtime -->
    <text x="60" y="976">Runs with no MATLAB / Fortran / Python dependency</text>
    <text x="635" y="976" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="785" y="976" text-anchor="middle" fill="#5a6672">○</text>
    <text x="935" y="976" text-anchor="middle" fill="#d98c54">◐</text>
    <text x="1085" y="976" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="1235" y="976" text-anchor="middle" fill="#5a6672">○</text>

    <!-- Single integrated GUI -->
    <text x="60" y="1004">One integrated real-time GUI (sim + analysis)</text>
    <text x="635" y="1004" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="785" y="1004" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="935" y="1004" text-anchor="middle" fill="#5a6672">○</text>
    <text x="1085" y="1004" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="1235" y="1004" text-anchor="middle" fill="#5a6672">○</text>

    <!-- Scriptable / embeddable -->
    <text x="60" y="1032">Scriptable / embeddable in a larger pipeline</text>
    <text x="635" y="1032" text-anchor="middle" fill="#d98c54">◐</text>
    <text x="785" y="1032" text-anchor="middle" fill="#d98c54">◐</text>
    <text x="935" y="1032" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="1085" y="1032" text-anchor="middle" fill="#d98c54">◐</text>
    <text x="1235" y="1032" text-anchor="middle" fill="#7ee0c0">●</text>

    <!-- Maturity / track record -->
    <text x="60" y="1060">Decades of maturity &amp; large user community</text>
    <text x="635" y="1060" text-anchor="middle" fill="#5a6672">○</text>
    <text x="785" y="1060" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="935" y="1060" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="1085" y="1060" text-anchor="middle" fill="#7ee0c0">●</text>
    <text x="1235" y="1060" text-anchor="middle" fill="#d98c54">◐</text>
  </g>

  <!-- row separators (subtle) -->
  <g stroke="#19212c" stroke-width="1">
    <line x1="60" y1="392" x2="1340" y2="392"/>
    <line x1="60" y1="476" x2="1340" y2="476"/>
    <line x1="60" y1="628" x2="1340" y2="628"/>
    <line x1="60" y1="684" x2="1340" y2="684"/>
    <line x1="60" y1="836" x2="1340" y2="836"/>
    <line x1="60" y1="920" x2="1340" y2="920"/>
  </g>

  <!-- ===== footer: honest positioning ===== -->
  <line x1="60" y1="1098" x2="1340" y2="1098" stroke="#2a3441" stroke-width="1.5"/>
  <text x="60" y="1126" font-family="Georgia,serif" font-style="italic" font-size="18" fill="#7ee0c0">Where dynsys is different</text>
  <text x="60" y="1150" font-size="13.5" fill="#aeb8c4">A single self-contained native binary that puts interactive simulation, phase portraits, 3D, fractals, basins, and continuation in one window —</text>
  <text x="60" y="1170" font-size="13.5" fill="#aeb8c4">and, uniquely, backs the analysis with a <tspan fill="#ffd24d">proof-carrying exact CAS</tspan>: exact eigenvalues, exact equilibria, and exact Routh–Hurwitz over rational arithmetic.</text>

  <text x="60" y="1202" font-family="Georgia,serif" font-style="italic" font-size="18" fill="#cdd6e0">Where the established tools still lead</text>
  <text x="60" y="1226" font-size="13.5" fill="#8a95a1">MatCont &amp; AUTO remain the gold standard for deep cycle analysis: torus / period-doubling / Neimark–Sacker, periodic normal forms, homoclinic orbits.</text>
</svg>
